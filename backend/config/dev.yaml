# HRMS · 开发环境配置
# 优先级：环境变量 > 本文件 > 代码默认值
# 启动方式：python -m app.main  （不设 APP_ENV 即默认 dev）

APP_NAME: HRMS
APP_ENV: dev
DEBUG: true

DATABASE_URL: "mysql+pymysql://root:root@127.0.0.1:3306/hrms?charset=utf8mb4"
DB_ECHO: true

# 开发用占位密钥，生产必须通过环境变量覆盖
JWT_SECRET: dev-secret-change-me
JWT_ALGORITHM: HS256
ACCESS_TOKEN_EXPIRE_MINUTES: 120
REFRESH_TOKEN_EXPIRE_MINUTES: 10080

MAX_LOGIN_ERROR_COUNT: 5
LOCK_MINUTES: 30
CAPTCHA_EXPIRE_MINUTES: 5